name: Daily Telegram Schedule

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      override_date:
        description: "Data da testare in formato YYYY-MM-DD"
        required: false
        default: ""

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa librerie
        run: pip install -r requirements.txt

      - name: Esegui il bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          OVERRIDE_DATE: ${{ github.event.inputs.override_date }}
        run: python bot.py
